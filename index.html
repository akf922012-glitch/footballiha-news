<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فوتبال نیوز - سایت شخصی من</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background-color: #f4f4f4; margin: 0; line-height: 1.6; }
        
        /* هدر سایت */
        header { background-color: #1a5276; color: white; padding: 20px; text-align: center; }
        
        /* کارت‌های خبر */
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .news-card { background: white; margin-bottom: 20px; padding: 20px; border-radius: 10px; border-right: 5px solid #1a5276; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        h2 { color: #1a5276; margin-top: 0; }
        
        /* ریسپانسیو برای موبایل */
        @media (max-width: 600px) {
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>⚽ اخبار داغ فوتبال</h1>
    </header>

    <div class="container">
        <div class="news-card">
            <h2>تیتر خبر اول: پیروزی بزرگ تیم محبوب</h2>
            <p>اینجا خلاصه خبر اول را می‌نویسید. سایت شما در حال حاضر در کامپیوترتان به صورت زنده قابل مشاهده است.</p>
        </div>

        <div class="news-card">
            <h2>تیتر خبر دوم: تحلیل بازی دیشب</h2>
            <p>این دومین بخش خبری شماست. شما می‌توانید هر تعداد که خواستید از این بخش‌ها اضافه کنید.</p>
        </div>
    </div>

</body>
</html>
